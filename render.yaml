services:
  - type: web
    name: ai-tarot-divination-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: MINIMAX_MODEL
        value: MiniMax-M2.7
      - key: MINIMAX_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
