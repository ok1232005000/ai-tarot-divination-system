services:
  - type: web
    name: star-moon-tarot-oracle
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT:-10000} --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: MINIMAX_MODEL
        value: MiniMax-M2.7
      - key: AI_REQUEST_TIMEOUT
        value: 18
      - key: AI_CONNECT_TIMEOUT
        value: 5
      - key: MINIMAX_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
