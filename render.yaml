services:
  - type: web
    name: star-moon-tarot-oracle
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT:-10000} --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: AI_REQUEST_TIMEOUT
        value: 55
      - key: AI_CONNECT_TIMEOUT
        value: 5
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
